<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Car Request | Corporate Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">
                <a href="index.html">
                    <img src="../assets/go_ride_logo.png" alt="GoRide Logo">
                </a>
            </div>
            <div class="nav-right">
                <span style="font-weight: 600; color: var(--text-color);"><i class="fas fa-building" style="margin-right: 8px; color: var(--primary-color);"></i> Acme Corporation</span>
                <a href="login.html" class="lang-toggle">Logout</a>
            </div>
        </div>
    </header>

    <div class="dashboard-wrapper">
        <aside class="sidebar">
            <ul class="sidebar-menu">
                <li><a href="dashboard-corporate.html"><i class="fas fa-th-large"></i> <span>Overview</span></a></li>
                <li><a href="corporate-fleet.html"><i class="fas fa-car"></i> <span>My Fleet</span></a></li>
                <li><a href="corporate-billing.html"><i class="fas fa-file-invoice-dollar"></i> <span>Billing</span></a></li>
                <li><a href="corporate-new-request.html" class="active"><i class="fas fa-plus-circle"></i> <span>New Request</span></a></li>
                <li><a href="corporate-history.html"><i class="fas fa-history"></i> <span>History</span></a></li>
                <li><a href="contact.html"><i class="fas fa-headset"></i> <span>Support</span></a></li>
                <li><a href="corporate-settings.html"><i class="fas fa-cog"></i> <span>Settings</span></a></li>
            </ul>
        </aside>

        <main class="main-content">
            <div class="dashboard-header">
                <h2>Request a New Vehicle</h2>
                <p style="color: var(--text-light);">Submit a request for an additional car or microbus for your team.</p>
            </div>

            <div class="form-container" style="margin: 0; max-width: 800px;">
                <form id="newRequestForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>Service Type</label>
                            <select class="form-control">
                                <option>Office Pick/Drop</option>
                                <option>Executive Rental</option>
                                <option>Monthly Subscription</option>
                                <option>Event Support</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Vehicle Type</label>
                            <select class="form-control">
                                <option>Sedan (Standard)</option>
                                <option>SUV (Premium)</option>
                                <option>Microbus (10-12 Seats)</option>
                                <option>Grand Cabin (14 Seats)</option>
                            </select>
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label>Required From Date</label>
                            <input type="date" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Required For (Duration)</label>
                            <select class="form-control">
                                <option>One Day</option>
                                <option>Weekly</option>
                                <option>Monthly</option>
                                <option>Indefinite (Subscription)</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Pickup Location</label>
                        <input type="text" class="form-control" placeholder="Office address or specific point">
                    </div>

                    <div class="form-group">
                        <label>Special Instructions</label>
                        <textarea class="form-control" rows="3" placeholder="e.g. Need a non-smoking driver, AC must be high-powered..."></textarea>
                    </div>

                    <button type="submit" class="btn-primary">Submit Request</button>
                </form>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
